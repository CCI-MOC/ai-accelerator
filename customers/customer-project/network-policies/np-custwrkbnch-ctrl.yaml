apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: np-custwrkbnch-ctrl
  namespace: cust-project
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: redhat-ods-applications
    ports:
    - port: 8443
      protocol: TCP
  podSelector:
    matchLabels:
      notebook-name: custwrkbnch
  policyTypes:
  - Ingress
