apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: custwrkbnch
  namespace: cust-project
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: custwrkbnch
  namespace: cust-project
  labels:
    app: custwrkbnch
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    opendatahub.io/image-display-name: Jupyter | Data Science | CPU | Python 3.12
    opendatahub.io/username: custwrkbnch
    opendatahub.io/hardware-profile-name: default-profile
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/user: custwrkbnch
    openshift.io/display-name: custwrkbnch
    openshift.io/description: ''
    notebooks.opendatahub.io/inject-auth: "true"
    notebooks.opendatahub.io/last-image-selection: 's2i-generic-data-science-notebook:2025.2'
    opendatahub.io/connections: ''
    opendatahub.io/workbench-image-namespace: ''
spec:
  template:
    spec:
      enableServiceLinks: false
      serviceAccountName: custwrkbnch
      containers:
        - name: custwrkbnch
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2025.2
          imagePullPolicy: Always
          workingDir: /opt/app-root/src
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "2"
              memory: 4Gi
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                                  --ServerApp.token=''
                                  --ServerApp.password=''
                                  --ServerApp.base_url=/notebook/cust-project/custwrkbnch
                                  --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: 'image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2025.2'
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: KF_PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          volumeMounts:
            - mountPath: /opt/app-root/src/
              name: custwrkbnch
            - mountPath: /dev/shm
              name: shm
            - mountPath: /etc/pki/tls/custom-certs
              name: trusted-ca
              readOnly: true
            - mountPath: /opt/app-root/pipeline-runtimes/
              name: runtime-images
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /notebook/cust-project/custwrkbnch/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /notebook/cust-project/custwrkbnch/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
        - name: kube-rbac-proxy
          image: 'registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:a059f453011028f7f18b3c7ec6406a958aa7a5b9bf6c67d084ea9d5d36d6c970'
          imagePullPolicy: Always
          args:
            - '--secure-listen-address=0.0.0.0:8443'
            - '--upstream=http://127.0.0.1:8888/'
            - '--logtostderr=true'
            - '--v=10'
            - '--proxy-endpoints-port=8444'
            - '--config-file=/etc/kube-rbac-proxy/config-file.yaml'
            - '--tls-cert-file=/etc/tls/private/tls.crt'
            - '--tls-private-key-file=/etc/tls/private/tls.key'
            - '--auth-header-fields-enabled=true'
            - '--auth-header-user-field-name=X-Auth-Request-User'
            - '--auth-header-groups-field-name=X-Auth-Request-Groups'
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 100m
              memory: 64Mi
          ports:
            - containerPort: 8443
              name: kube-rbac-proxy
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/kube-rbac-proxy
              name: kube-rbac-proxy-config
            - mountPath: /etc/tls/private
              name: kube-rbac-proxy-tls-certificates
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8444
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8444
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
      volumes:
        - name: custwrkbnch
          persistentVolumeClaim:
            claimName: custwrkbnch
        - emptyDir:
            medium: Memory
          name: shm
        - configMap:
            name: workbench-trusted-ca-bundle
            optional: true
          name: trusted-ca
        - configMap:
            name: pipeline-runtime-images
            optional: true
          name: runtime-images
