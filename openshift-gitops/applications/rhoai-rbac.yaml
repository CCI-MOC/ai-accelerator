apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openshift-gitops-rhoai-rhoai-resources
rules:
  - apiGroups:
      - datasciencecluster.opendatahub.io
      - dscinitialization.opendatahub.io
      - infrastructure.opendatahub.io
      - opendatahub.io
      - services.platform.opendatahub.io
      - gateway.networking.k8s.io
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-gitops-rhoai-rhoai-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshift-gitops-rhoai-rhoai-resources
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-rhoai-argocd-application-controller
    namespace: openshift-gitops-rhoai
