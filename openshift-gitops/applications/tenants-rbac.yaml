apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openshift-gitops-rhoai-tenant-resources
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - serviceaccounts
      - secrets
      - configmaps
      - persistentvolumeclaims
      - services
      - resourcequotas
      - limitranges
      - pods
      - pods/log
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - groups
    verbs: ["*"]
  - apiGroups: ["user.openshift.io"]
    resources:
      - groups
    verbs: ["*"]
  - apiGroups: ["route.openshift.io"]
    resources:
      - routes
    verbs: ["*"]
  - apiGroups: ["kubeflow.org"]
    resources:
      - notebooks
    verbs: ["*"]
  - apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
    resources:
      - datasciencepipelinesapplications
    verbs: ["*"]
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources:
      - datascienceprojects
    verbs: ["*"]
  - apiGroups: ["serving.kserve.io"]
    resources:
      - inferenceservices
      - servingruntimes
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-gitops-rhoai-tenant-resources
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshift-gitops-rhoai-tenant-resources
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-rhoai-argocd-application-controller
    namespace: openshift-gitops-rhoai
