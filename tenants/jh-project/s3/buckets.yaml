apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-init
  namespace: jh-project
  annotations:
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      containers:
        - name: bucket-init
          image: docker.io/rustfs/rustfs:latest
          command:
            - /bin/sh
            - -c
            - |
              /rustfs/rustfs mb s3://pipeline-artifacts --endpoint="http://rustfs-s3.jh-project:9000" --access-key="$RUSTFS_ACCESS_KEY" --secret-key="$RUSTFS_SECRET_KEY" 2>/dev/null || true
              /rustfs/rustfs mb s3://model-artifacts --endpoint="http://rustfs-s3.jh-project:9000" --access-key="$RUSTFS_ACCESS_KEY" --secret-key="$RUSTFS_SECRET_KEY" 2>/dev/null || true
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_SECRET_KEY
      restartPolicy: Never
