apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: admin
  namespace: jh-project
  labels:
    app: opendatahub
    component: odh-dashboard-notebook
    opendatahub.io/dashboard: "true"
    opendatahub.io/user: admin
    notebooks.opendatahub.io/odh-managed: "true"
    notebooks.opendatahub.io/enable-oauth: "true"
    notebooks.opendatahub.io/enable-route: "true"
    notebooks.opendatahub.io/notebook-image-name: s2i-generic-data-science-notebook
    notebooks.opendatahub.io/notebook-image-tag: "3.4"
    opendatahub.io/hardware-profile: default-profile
  annotations:
    notebooks.opendatahub.io/odh-managed: "true"
    notebooks.opendatahub.io/enable-oauth: "true"
    notebooks.opendatahub.io/enable-route: "true"
    notebooks.opendatahub.io/notebook-image-name: s2i-generic-data-science-notebook
    notebooks.opendatahub.io/notebook-image-tag: "3.4"
    notebooks.opendatahub.io/notebook-name: admin
    opendatahub.io/hardware-profile: default-profile
spec:
  template:
    spec:
      serviceAccountName: admin
      containers:
        - name: admin
          image: "registry.redhat.io/rhoai/odh-workbench-jupyter-datascience-cpu-py312-rhel9@sha256:d82680de09eb333892da42e626756dc7d66e4b3d49222af2e1172f5443b4daad"
          imagePullPolicy: Always
          resources:
            limits:
              cpu: "2
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=9999
                --ServerApp.ip=0.0.0.0
                --ServerApp.notebook_dir=/home/opendatahub/workspace
                --ServerApp.allow_origin=
                --ServerApp.disable_check_xsrf=true
            - name: RHOAI_MANAGED_ENV
              value: "true"
            - name: JUPYTER_IMAGE
              value: s2i-generic-data-science-notebook
            - name: JUPYTER_IMAGE_TAG
              value: "3.4"
            - name: NOTEBOOK_NAME
              value: admin
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 9999
              name: notebook-port
              protocol: TCP
          volumeMounts:
            - name: wb-admin
              mountPath: /home/opendatahub/workspace
      volumes:
        - name: wb-admin
          persistentVolumeClaim:
            claimName: wb-admin
