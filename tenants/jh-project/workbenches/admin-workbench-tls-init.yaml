apiVersion: batch/v1
kind: Job
metadata:
  name: admin-workbench-tls-init
  namespace: jh-project
  annotations:
    argocd.argoproj.io/hook: PreSync
spec:
  template:
    spec:
      containers:
        - name: cert-init
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl get secret admin-workbench-kube-rbac-proxy-tls -n jh-project 2>/dev/null && exit 0
              openssl req -x509 -newkey rsa:2048 -nodes \
                -keyout /tmp/tls.key -out /tmp/tls.crt -days 365 \
                -subj "/CN=admin-workbench.jh-project.svc"
              kubectl create secret tls admin-workbench-kube-rbac-proxy-tls \
                -n jh-project --cert=/tmp/tls.crt --key=/tmp/tls.key
      restartPolicy: Never
      serviceAccountName: admin-workbench
