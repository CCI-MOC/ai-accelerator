apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota-gpu
  namespace: jh-project
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    requests.cpu: "8"
    limits.cpu: "16"
    requests.memory: "16Gi"
    limits.memory: "64Gi"
    requests.nvidia.com/gpu: "1"
    limits.nvidia.com/gpu: "1"
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: jh-project
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: "4Gi"
      defaultRequest:
        cpu: "500m"
        memory: "512Mi"
      max:
        cpu: "16"
        memory: "64Gi"
      min:
        cpu: "10m"
        memory: "15Mi"
