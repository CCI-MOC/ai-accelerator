apiVersion: v1
kind: Service
metadata:
  labels:
    app: rustfs
  name: rustfs-console
  namespace: jh-project-shared
spec:
  clusterIP: 172.30.240.106
  clusterIPs:
  - 172.30.240.106
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: console
    port: 9001
    protocol: TCP
    targetPort: 9001
  selector:
    app: rustfs
  sessionAffinity: None
  type: ClusterIP
