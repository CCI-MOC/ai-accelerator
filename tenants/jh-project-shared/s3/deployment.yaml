apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rustfs
  name: rustfs
  namespace: jh-project-shared
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: rustfs
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: rustfs
    spec:
      containers:
      - env:
        - name: RUSTFS_DATA
          value: /data
        - name: RUSTFS_ADDRESS
          value: :9000
        - name: RUSTFS_CONSOLE_ADDRESS
          value: :9001
        image: docker.io/rustfs/rustfs:latest
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: rustfs
        ports:
        - containerPort: 9000
          name: api
          protocol: TCP
        - containerPort: 9001
          name: console
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: rustfs-data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: rustfs
      serviceAccountName: rustfs
      terminationGracePeriodSeconds: 30
      volumes:
      - name: rustfs-data
        persistentVolumeClaim:
          claimName: rustfs-data
